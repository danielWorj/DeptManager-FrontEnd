<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5ca8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a800;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Subtle top highlight -->
  <rect width="64" height="32" rx="14" fill="white" opacity="0.04"/>

  <!-- Mortarboard cap top (flat trapezoid) -->
  <polygon points="32,10 54,21 32,26 10,21" fill="url(#capGrad)"/>

  <!-- Cap top shine -->
  <polygon points="32,10 54,21 43,18 32,13" fill="white" opacity="0.15"/>

  <!-- Cap base rim -->
  <ellipse cx="32" cy="21" rx="22" ry="4" fill="#c8922a" opacity="0.5"/>

  <!-- Tassel string -->
  <line x1="54" y1="21" x2="54" y2="33" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="54" cy="35" r="3" fill="url(#capGrad)"/>

  <!-- Book / scroll body -->
  <rect x="18" y="30" width="28" height="20" rx="3" fill="white" opacity="0.92"/>
  <!-- Book spine -->
  <rect x="18" y="30" width="5" height="20" rx="2" fill="#0d5ca8" opacity="0.7"/>
  <!-- Book lines (text simulation) -->
  <rect x="26" y="35" width="14" height="2" rx="1" fill="#1a3a6b" opacity="0.4"/>
  <rect x="26" y="40" width="10" height="2" rx="1" fill="#1a3a6b" opacity="0.3"/>
  <rect x="26" y="45" width="12" height="2" rx="1" fill="#1a3a6b" opacity="0.3"/>
</svg>
