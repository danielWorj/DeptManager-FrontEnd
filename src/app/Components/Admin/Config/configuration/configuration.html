<div class="container-fluid p-4">
        <div class="row mb-4">
            <div class="col">
                <h4 class="fw-bold mb-2">
                    <i class="fas fa-cog text-primary me-2"></i>Configuration Académique
                </h4>
                <p class="text-muted">Gérez les départements, matières et filières de votre établissement</p>
            </div>
        </div>

         <!-- Navigation par onglets -->
            <ul class="nav nav-pills mb-4" id="configTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="departements-tab" data-bs-toggle="tab" data-bs-target="#departements" type="button" role="tab">
                        <i class="fas fa-building me-2"></i>Départements
                    </button>
                </li>
                 <li class="nav-item ms-1" role="presentation">
                    <button class="nav-link" id="filieres-tab" data-bs-toggle="tab" data-bs-target="#filieres" type="button" role="tab">
                        <i class="fas fa-graduation-cap me-2"></i>Filières
                    </button>
                </li>
                <li class="nav-item ms-1" role="presentation">
                    <button class="nav-link" id="matieres-tab" data-bs-toggle="tab" data-bs-target="#matieres" type="button" role="tab">
                        <i class="fas fa-book me-2"></i>Matières
                    </button>
                </li>
                <li class="nav-item ms-1" role="presentation">
                    <button class="nav-link" id="filieres-tab" data-bs-toggle="tab" data-bs-target="#salles" type="button" role="tab">
                        <i class="fas fa-school me-2"></i>Salles
                    </button>
                </li>
                
               
            </ul>

            <!-- Contenu des onglets -->
            <div class="tab-content" id="configTabContent">
                            
                <!-- Onglet Départements -->
                <div class="tab-pane fade " id="departements" role="tabpanel">
                   <app-departement-c></app-departement-c>
                </div>

                <!-- Onglet Filières -->
                <div class="tab-pane fade" id="filieres" role="tabpanel">
                   <app-filiere-c></app-filiere-c>
                </div>

                 <!-- Onglet Matières -->
                <div class="tab-pane fade" id="matieres" role="tabpanel">
                    <app-matiere-c></app-matiere-c>
                </div>

                <!-- Onglet Salles -->
                <div class="tab-pane fade" id="salles" role="tabpanel">
                   <app-salle-c></app-salle-c>
                </div>

            </div>
    </div>
