 <div class="card">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control" placeholder="Rechercher un département...">
                </div>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-primary"  data-bs-target="#addsalleModal"  type="button" data-bs-toggle="modal" data-bs-target="#basicModal3">
                    <i class="fas fa-plus me-2"></i>Nouvelle Salle
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Nom de la salle</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    @for (s of listSalle(); track $index) {
                        <tr>
                            <td>{{$index+1}}</td>
                            <td class="fw-semibold">{{s.intitule}}</td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-icon btn-outline-primary me-1">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-icon btn-outline-danger">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    }
                    
                </tbody>
            </table>
        </div>
    </div>
</div>

 <div class="card-body">

        <!-- Modal -->
    <div class="modal fade" id="basicModal3" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
            <h5 class="modal-title" id="addsalleModal">Creation </h5>
            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
            ></button>
            </div>
            <div class="modal-body">
            <form action="" [formGroup]="salleForm" (ngSubmit)="createSalle()">
                 <div class="row">
                    <div class="col mb-3">
                        <label for="nameBasic" class="form-label">Intitule</label>
                        <input type="text" id="nameBasic" class="form-control" formControlName="intitule" placeholder="Entrer l'intitule" />
                    </div>
                    
                </div>
                <button type="submit" class="btn btn-primary" aria-label="Close" data-bs-dismiss="modal" >Save changes</button>

            </form>

        </div>
        </div>
    </div>
 
</div>
