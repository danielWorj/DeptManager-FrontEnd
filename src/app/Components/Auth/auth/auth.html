<!-- Wrapper pleine largeur, centré, avec padding mobile -->
<div class="auth-page-wrapper">
  <div class="authentication-wrapper authentication-basic">
    <div class="authentication-inner auth-card-container">
      <div class="card auth-card">

        <!-- ══════════ SPINNER OVERLAY ══════════ -->
        <div class="spinner-overlay" *ngIf="isLoading">
          <div class="spinner-backdrop"></div>
          <div class="spinner-content">
            <div class="spinner-ring">
              <div class="spinner-ring__arc spinner-ring__arc--1"></div>
              <div class="spinner-ring__arc spinner-ring__arc--2"></div>
              <div class="spinner-ring__arc spinner-ring__arc--3"></div>
              <div class="spinner-ring__dot"></div>
            </div>
            <p class="spinner-label">Connexion en cours<span class="spinner-dots"></span></p>
          </div>
        </div>
        <!-- ══════════ /SPINNER OVERLAY ══════════ -->

        <div class="card-body" [class.card-body--blurred]="isLoading">

          <!-- ── Logo personnalisé ── -->
          <div class="app-brand justify-content-center mb-4">
            <a href="javascript:void(0)" class="app-brand-link gap-2 text-decoration-none">

              <!-- Favicon SVG inline (remplace le logo Sneat) -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="42" height="42">
                <defs>
                  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#0d5ca8;stop-opacity:1" />
                  </linearGradient>
                  <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#e8a800;stop-opacity:1" />
                  </linearGradient>
                </defs>
                <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>
                <rect width="64" height="32" rx="14" fill="white" opacity="0.04"/>
                <polygon points="32,10 54,21 32,26 10,21" fill="url(#capGrad)"/>
                <polygon points="32,10 54,21 43,18 32,13" fill="white" opacity="0.15"/>
                <ellipse cx="32" cy="21" rx="22" ry="4" fill="#c8922a" opacity="0.5"/>
                <line x1="54" y1="21" x2="54" y2="33" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
                <circle cx="54" cy="35" r="3" fill="url(#capGrad)"/>
                <rect x="18" y="30" width="28" height="20" rx="3" fill="white" opacity="0.92"/>
                <rect x="18" y="30" width="5" height="20" rx="2" fill="#0d5ca8" opacity="0.7"/>
                <rect x="26" y="35" width="14" height="2" rx="1" fill="#1a3a6b" opacity="0.4"/>
                <rect x="26" y="40" width="10" height="2" rx="1" fill="#1a3a6b" opacity="0.3"/>
                <rect x="26" y="45" width="12" height="2" rx="1" fill="#1a3a6b" opacity="0.3"/>
              </svg>

              <span class="app-brand-text fw-bolder fs-4 ms-2 text-dark">DeptManager</span>
            </a>
          </div>
          <!-- /Logo -->

          <h4 class="mb-1 text-center">Bienvenue 👋</h4>
          <p class="mb-4 text-center text-muted">Connectez-vous à votre espace</p>

          <form [formGroup]="authForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input
                type="email"
                class="form-control form-control-lg"
                formControlName="email"
                placeholder="votre@email.com"
                autofocus
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Mot de passe</label>
              <input
                type="password"
                class="form-control form-control-lg"
                formControlName="password"
                placeholder="••••••••"
              />
            </div>
            <div class="mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me" />
                <label class="form-check-label" for="remember-me">Se souvenir de moi</label>
              </div>
            </div>
            <div class="mb-3">
              <button
                class="btn btn-primary btn-lg d-grid w-100 login-btn"
                type="button"
                (click)="login()"
                [disabled]="isLoading"
              >
                Se connecter
              </button>
            </div>
          </form>

          <p class="text-center text-muted mt-2 mb-0">
            <small>Plateforme de gestion académique</small>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
